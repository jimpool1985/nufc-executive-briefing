Miley returns to training after thigh injury recovery.", "exec_note": "Captain's continued absence impacts tactical options and leadership during crucial European qualification push. Medical department management under scrutiny with multiple key player setbacks.", "source": "Yahoo Sports, 10 April 2026", "link": "https://sports.yahoo.com/articles/eddie-howes-team-news-mixed-083200876.html"}, {"category": "newcastle", "badge": "Transfer", "title": "Newcastle target Real Madrid striker Gonzalo Garcia as summer priority", "summary": "Newcastle United have identified Real Madrid striker Gonzalo Garcia as a summer transfer target following Alexander Isak's departure. The club's recruitment team is conducting extensive groundwork on attacking reinforcements, with securing a new No.9 remaining a top priority despite £125m spent on Nick Woltemade and Yoane Wissa.", "exec_note": "Continued striker search indicates previous transfer strategy requires correction. Significant investment already made suggests need for more refined recruitment approach in premium market segment.", "source": "TEAMtalk, 8 April 2026", "link": "https://www.teamtalk.com/newcastle-united/gonzalo-garcia-transfer-news-newcastle-real-madrid-approved"}, {"category": "newcastle", "badge": "Development", "title": "PIF planning major academy infrastructure investment for 2026", "summary": "Saudi Arabia's Public Investment Fund is set to focus significant investment on Newcastle United's academy infrastructure in 2026. Head of youth recruitment Paul Midgley rejected Manchester United's approach after being assured of major academy investment plans. The investment aims to compete with regional rivals Sunderland and Middlesbrough for top young talent.", "exec_note": "Strategic youth development investment leverages PSR exemptions for infrastructure spending. Long-term talent pipeline development aligns with sustainable growth objectives while maintaining competitive advantage in talent acquisition.", "source": "FourFourTwo, 7 January 2026", "link": "https://www.fourfourtwo.com/team/newcastle-united-set-for-major-saudi-investment-in-2026-report"}]}, {"day": "Saturday 11 April 2026", "date": "11 April 2026", "items": [{"category": "newcastle", "badge": "Transfer", "title": "Kieran Trippier confirms Newcastle United departure this summer", "summary": "<cite index=\"11-1,12-1,12-2\">Newcastle United officially announced that captain Kieran Trippier will leave the club when his contract expires this summer. The 35-year-old joined from Atlético Madrid for £12m in January 2022 and made over 150 appearances, helping secure Champions League qualification twice and winning the 2025 Carabao Cup.</cite> <cite index=\"11-11,13-7,13-8\">Trippier was the first major signing under Saudi ownership and was credited with transforming the club's culture during their rise from relegation candidates to trophy winners.</cite>", "exec_note": "<cite index=\"19-5,20-2\">The veteran defender is reportedly keen to move abroad again, with MLS and Saudi Pro League clubs expected to pursue him as a free agent.</cite> <cite index=\"13-6,13-7\">His departure marks the end of a transformative era and creates a significant leadership void that will need addressing in the summer transfer window.</cite>", "source": "Newcastle United Official, 4 April 2026", "link": "https://www.newcastleunited.com/en/news/kieran-trippier-and-newcastle-united-to-part-ways"}, {"category": "newcastle", "badge": "News", "title": "Eddie Howe receives private assurances over Newcastle United future", "summary": "<cite index=\"10-2,10-12,10-13\">CEO David Hopkinson held discussions with journalists regarding Newcastle's financial results, during which he suggested Eddie Howe's position could be reviewed if the season ends poorly.</cite> <cite index=\"10-16\">However, a new report claims Hopkinson and Howe have since held private talks where the manager was given assurances over his future at the club.</cite> <cite index=\"10-4\">Howe has stated he is \"100% committed\" despite speculation linking him with potential departure if European qualification is not achieved.</cite>", "exec_note": "<cite index=\"10-6,10-7\">The uncertainty highlights the pressure on achieving European qualification for 2026/27, with the club having operated without proper sporting director structure during challenging periods.</cite> <cite index=\"26-4,26-5\">Management stability will be crucial for summer planning as Newcastle seek to return to European competition after missing out this season.</cite>", "source": "NUFC Blog, 10 April 2026", "link": "https://www.nufcblog.co.uk/2026/04/10/eddie-howe-given-assurances-on-newcastle-future/"}, {"category": "newcastle", "badge": "News", "title": "Mixed injury news as Newcastle prepare for Crystal Palace clash", "summary": "<cite index=\"24-1,24-6\">Lewis Miley could make his first appearance since January against Crystal Palace, but captain Bruno Guimarães remains doubtful after suffering illness upon return from Brazil.</cite> <cite index=\"22-4,24-7\">Fabian Schär has suffered a setback with a foot infection requiring minor surgery, ruling him out for approximately one month.</cite> <cite index=\"22-5,38-6,38-7\">Sven Botman is available after eye socket surgery following the Sunderland match but will need to wear a protective mask if selected.</cite>", "exec_note": "<cite index=\"38-19,38-20\">Newcastle currently sit 12th in the Premier League, four points off European qualification, making the return of key players crucial for securing continental competition and the associated financial benefits.</cite> <cite index=\"26-9\">The squad has struggled with injuries all season, with Howe noting they haven't trained with 20 players since August.</cite>", "source": "Newcastle United Official, 10 April 2026", "link": "https://www.newcastleunited.com/en/news/eddie-howes-team-news-update-mixed-news-on-injury-front"}]}, {"day": "Friday 10 April 2026", "date": "10 April 2026", "items": [{"category": "legal", "badge": "Regulatory", "title": "Premier League confirms replacement of PSR with new Squad Cost Ratio from 2026/27", "summary": "<cite index=\"1-1,2-2\">From the 2026/27 season, the Premier League will replace its existing Profitability and Sustainability Rules (PSR) with two new frameworks called the Squad Cost Ratio (SCR) and Sustainability and Systemic Resilience (SSR)</cite>. <cite index=\"1-10,1-12,1-13\">Under SCR, clubs will have to keep their spending on wages, transfer fees and agent commissions within 70% of their football-related income if competing in Europe, or 85% for domestic-only clubs</cite>. <cite index=\"1-16,1-17\">Compliance monitoring will be conducted live in-season starting March 1, 2026, with clubs having an extra 30% allowance before facing sporting sanctions</cite>.", "exec_note": "This fundamental regulatory shift moves from loss-based to revenue-based constraints, potentially creating new opportunities for commercially successful clubs to invest more while limiting debt-financed spending. The in-season monitoring provides greater certainty but requires more sophisticated financial planning capabilities.", "source": "Ankura, February 17, 2026", "link": "https://ankura.com/insights/goodbye-psr-hello-scr-the-premier-leagues-financial-evolution"}, {"category": "legal", "badge": "Financial", "title": "New financial rules introduce three-tier financial health testing system", "summary": "<cite index=\"7-11\">Under the new SSR rules, clubs will face three financial tests: a working capital test requiring £12.5 million minimum monthly combined working capital and projected cash balance, a liquidity test requiring positive headroom under stress testing over two years, and a positive equity test with thresholds set at 90% for 2026/27, reducing to 80% by 2028/29</cite>. <cite index=\"20-12,20-13\">Non-compliant clubs must submit business plans showing how they will return to compliance, with the League able to impose contract approval requirements and spending limits as enforcement measures</cite>.", "exec_note": "These stringent financial health checks create new operational requirements beyond traditional PSR compliance, potentially affecting financing structures and requiring enhanced liquidity management. The graduated thresholds provide predictable long-term planning parameters.", "source": "Farrer & Co, 1 week ago", "link": "https://www.farrer.co.uk/news-and-insights/premier-league-financial-fair-play-rules-reform-explained/"}, {"category": "legal", "badge": "News", "title": "EFL implements immediate P&S rule changes affecting Championship clubs", "summary": "<cite index=\"15-1,15-9\">The English Football League has introduced changes to Profit & Sustainability rules and Salary Cost Management Protocol rules for the 2025/26 season, focusing on filing deadlines, sanctions application, and calculation adjustments for Championship clubs</cite>. <cite index=\"15-8\">The changes specifically address timing of P&S submissions, the ability to apply Premier League-imposed sanctions, and equity injections into clubs</cite>.", "exec_note": "These EFL changes affect clubs moving between divisions and create consistency concerns with Premier League PSR transition timing. Championship clubs face continued regulatory uncertainty while Premier League moves to new system from 2026.", "source": "Law in Sport, November 20, 2025", "link": "https://www.lawinsport.com/topics/item/unpacking-the-efls-financial-rule-changes-for-2025-26-and-how-they-impact-clubs"}, {"category": "legal", "badge": "Development", "title": "Asset disposal restrictions target creative compliance under new SCR framework", "summary": "<cite index=\"22-5,22-6\">Under the new SCR system, revenue from intra-group transactions such as transferring hotels or women's teams to related entities will no longer count for compliance, with only core football operations revenue including broadcasting, matchday and commercial income being considered</cite>. <cite index=\"22-7\">The SCR includes a graduated sanctions framework with financial penalties for moderate breaches and sporting sanctions including points deductions for serious overspending</cite>.", "exec_note": "This closes significant PSR loopholes that clubs have exploited through related-party asset sales, requiring clubs to genuinely grow football revenues rather than rely on accounting maneuvers. The predictable sanctions framework provides clearer risk assessment for transfer strategy.", "source": "Lexology, December 15, 2025", "link": "https://www.lexology.com/library/detail.aspx?g=e05f54e8-9a01-475e-acbf-c0942fbf92fc"}, {"category": "infra", "badge": "Development", "title": "Crystal Palace receives final approval to begin Selhurst Park Main Stand demolition in January 2026", "summary": "<cite index=\"35-3,35-4,38-10\">Crystal Palace has completed the purchase of six houses on Wooderson Close, clearing the last residential obstacle for the Main Stand redevelopment, with construction work confirmed to begin in January 2026</cite>. <cite index=\"38-6,38-8\">The redevelopment will last just over two years and is expected to be completed during the 2026/27 season, increasing the Main Stand capacity from 5,200 to approximately 13,500 seats</cite>.", "exec_note": "<cite index=\"38-21,38-22\">Stadium capacity expansion projects directly impact revenue potential, as Crystal Palace's current matchday income of £13.8 million in 2023/24 could significantly improve with the upgraded 34,000-capacity stadium</cite>. <cite index=\"38-17,38-18\">The project showcases modern stadium financing, with Goldman Sachs leading a £125 million loan facility structured with longer repayment periods aligned to stadium timelines rather than TV revenue cycles</cite>.", "source": "New Civil Engineer, January 13, 2026", "link": "https://www.newcivilengineer.com/?p=301488"}, {"category": "infra", "badge": "Official update", "title": "Newcastle United confirms St James' Park modernisation approved for summer 2026", "summary": "<cite index=\"21-1,21-2,21-4\">Newcastle United has received approval from its Saudi owners to modernize St James' Park, with first works expected to begin in summer after the 2025/2026 season focusing on improving fan comfort and stadium infrastructure</cite>. <cite index=\"21-10\">One of the most significant planned changes will be the installation of additional television screens in the stadium's circulation areas, known as concourses</cite>.", "exec_note": "<cite index=\"21-11,21-12,21-15\">While major stadium redevelopment or new venue construction has been pushed to the background, the club's leadership is currently focusing on other infrastructure investments, such as the development of the training centre and the reorganisation of management structures</cite>. This demonstrates how clubs balance immediate operational improvements with longer-term capital expenditure priorities.", "source": "StadiumDB.com, March 10, 2026", "link": "https://stadiumdb.com/news/2026/03/england_green_light_for_the_modernization_of_st_james_park_works_set_to_begin_this_summer"}, {"category": "infra", "badge": "News", "title": "Newcastle United sells St James' Park to subsidiary for £133.2m to enable stadium development financing", "summary": "<cite index=\"24-8,24-9\">Newcastle recorded a £34.7m profit by selling St James' Park to another company owned by the club's owners for £172.1m, with the club stating the sale was to smooth the process of either redeveloping the stadium or constructing a new ground</cite>. <cite index=\"23-16\">The motivation was to reorganise property assets and get them into correct legal boxes to facilitate potential development with financing and other similar items</cite>.", "exec_note": "<cite index=\"24-9\">This financial engineering demonstrates how Premier League clubs use intragroup transactions to avoid PSR breaches while positioning for major capital projects, with the new stadium-owning company expected to borrow construction funds rather than saddle the club with debt</cite>. The structure separates operational football losses from infrastructure investment, a model increasingly used across professional sports.", "source": "NUFC The Mag, March 2026", "link": "https://www.themag.co.uk/2026/03/newcastle-united-owners-sell-st-james-park-to-themselves-to-progress-new-stadium-development/"}, {"category": "infra", "badge": "News", "title": "Newcastle United agrees multi-year training ground naming rights deal with KNOX Hydration", "summary": "<cite index=\"12-5,12-6,12-7\">Newcastle United has signed a multi-year deal with KNOX Hydration to rename its training ground The Knox, with the agreement described as a 'transformative' commercial deal that represents a significant revenue stream for the club</cite>. <cite index=\"12-11\">The deal was announced on April 2, 2026</cite>.", "exec_note": "<cite index=\"12-8,12-16\">Naming rights deals are becoming increasingly common in the Premier League as clubs look to maximize commercial opportunities, highlighting the growing importance of commercial partnerships in modern football to fund ambitions</cite>. Training ground naming rights represent a lower-profile but valuable revenue stream compared to stadium naming rights.", "source": "Newcastle Today, April 2, 2026", "link": "https://nationaltoday.com/us/wy/newcastle-wy/news/2026/04/02/newcastle-agrees-transformative-training-ground-deal/"}, {"category": "infra", "badge": "Development", "title": "Newcastle United €1.5bn Spotify Camp Nou renovation nears completion as second stands ready by end 2024", "summary": "<cite index=\"8-9,8-10,8-11\">Turkish contractor Limak is undertaking the renovation of Barcelona FC's Camp Nou stadium with the revamped stadium able to host 64,000 people by 2025 after a €1.5 billion investment, with the first and second stands expected to be ready by the end of 2024</cite>.", "exec_note": "Major stadium renovation projects demonstrate the scale of investment required in modern football infrastructure, with the Camp Nou project serving as a benchmark for similar Premier League developments. The phased approach allows clubs to maintain operations while upgrading facilities, a model relevant for other major stadium projects.", "source": "Construction Briefing, August 12, 2024", "link": "https://www.constructionbriefing.com/news/14-major-stadium-projects-under-construction-and-development-around-the-world/8038268.article?zephr_sso_ott=o020fA"}, {"category": "governing", "badge": "Official update", "title": "FIFA Opens Disciplinary Proceedings Against Spanish FA Over Anti-Muslim Chants", "summary": "FIFA has launched disciplinary action against the Spanish Football Federation following <cite index=\"22-3,22-4,22-5\">anti-Muslim chants heard during Spain's friendly against Egypt on March 31 at the RCDE Stadium in Barcelona, where fans chanted \"Whoever doesn't jump is a Muslim\"</cite>. <cite index=\"22-2,29-17\">Barcelona star Lamine Yamal, who is Muslim, condemned the chants as \"ignorant and racist\"</cite>.", "exec_note": "Governing body disciplinary action highlights the ongoing focus on addressing discriminatory fan behaviour, which could impact stadium sanctions and security protocols. Clubs may face increased scrutiny of their fan engagement and stadium management practices.", "source": "Al Jazeera, April 7, 2026", "link": "https://www.aljazeera.com/sports/2026/4/7/fifa-opens-disciplinary-probe-against-spanish-fa-after-islamaphobic-chants"}, {"category": "governing", "badge": "Official update", "title": "FIFA Approves Enhanced VAR Powers and 2026 World Cup Rule Changes", "summary": "<cite index=\"2-11,2-12\">VAR will now cover clearly incorrect second yellow card decisions and mistaken identity cases, while competitions can opt for VAR to review corner kick decisions</cite>. <cite index=\"2-1,2-4\">New time-wasting measures include five-second limits for restarts and players receiving treatment must leave the field for one minute</cite>.", "exec_note": "VAR expansion and time-wasting measures will directly impact match dynamics and player management strategies. Clubs should prepare coaching staff and medical teams for the new treatment protocols and potential tactical implications.", "source": "InsiderSport, March 27, 2026", "link": "https://insidersport.com/2026/03/27/fifa-new-rules-2026-world-cup/"}, {"category": "governing", "badge": "Regulatory", "title": "Independent Football Regulator Powers Active from December 2026", "summary": "<cite index=\"13-3,13-4,13-5\">The IFR can now investigate current football club owners in the top five tiers and enforce sanctions including financial penalties, public censure, and forced sales in extreme cases</cite>. <cite index=\"13-1,13-7\">From May 2026, all potential new owners, directors and senior executives must be approved by the IFR's ODSE Test</cite>.", "exec_note": "The IFR's activation represents a fundamental shift in football governance with direct implications for ownership structures, financial reporting requirements, and compliance obligations. Premier League clubs face new regulatory oversight beyond existing league rules.", "source": "Sky Sports, December 4, 2025", "link": "https://www.skysports.com/football/news/11095/13479481/independent-football-regulator-ready-to-finally-act-against-rogue-owners-when-it-comes-into-effect-on-december-12"}, {"category": "governing", "badge": "Development", "title": "IFR Announces Memorandum of Understanding with Financial Conduct Authority", "summary": "<cite index=\"15-5,15-24,16-3,16-4\">The IFR and FCA have established a framework for sharing confidential information, announced in February 2026, creating formal cooperation between the two regulatory bodies</cite>. <cite index=\"15-1,15-20\">IFR Chief Executive Richard Monks, a former FCA director, has signaled the regulator will be a positive force for investment while not shying away from intervention where financial sustainability is threatened</cite>.", "exec_note": "The regulatory partnership between IFR and FCA creates potential for cross-sector oversight of club finances and ownership structures. This could impact due diligence requirements for transactions and investment structures involving regulated financial entities.", "source": "FCA Statement, February 24, 2026", "link": "https://www.fca.org.uk/news/statements/mou-independent-football-regulator-fca"}, {"category": "europe", "badge": "Transfer", "title": "Antoine Griezmann confirms MLS move to Orlando City after Atlético Madrid season ends", "summary": "<cite index=\"41-1,42-3\">Orlando City completed a blockbuster transfer announcing they have acquired forward Antoine Griezmann from LaLiga side Atlético Madrid. The French attacker has signed a contract beginning July 2026 and extending through the 2027-28 season, with an option for 2028-29.</cite> <cite index=\"41-12,41-13\">Griezmann is Orlando's latest big-name signing, following previous stints with Brazilian midfielder Kaká and Portuguese winger Nani. He completes the club's DP trio alongside Croatian international Marco Pašalić and Argentine playmaker Martín Ojeda.</cite>", "exec_note": "Major player departures from European leagues to MLS continue the trend of top talent leaving before career decline. This signals shifting global football economics and MLS's growing appeal as a destination for elite players seeking competitive moves rather than retirement options.", "source": "MLS Soccer, March 24, 2026", "link": "https://www.mlssoccer.com/news/orlando-city-sign-french-superstar-antoine-griezmann-atletico-madrid-transfer"}, {"category": "europe", "badge": "Transfer", "title": "Bayern Munich planning €80 million summer spending on left-back and right-back positions", "summary": "<cite index=\"11-6,11-7\">Bayern are looking for a Luis Díaz backup on the left wing as well as a right-back for the new season. The club would be willing to spend around €80m to fill these positions, while also raising funds through sales.</cite> <cite index=\"11-7\">Raphaël Guerreiro and Leon Goretzka have both announced their departures in the summer and will need to be replaced as well.</cite>", "exec_note": "Bayern's focused spending approach on specific problem positions reflects how top clubs are becoming more strategic in transfer planning. The €80m budget for two positions shows continuing high market values despite financial pressures affecting other areas of club operations.", "source": "Bavarian Football Works, April 10, 2026", "link": "https://www.bavarianfootballworks.com/bayern-munich-transfer-rumors-news/186612/bayern-munich-will-look-to-spend-around-e80-million-in-the-summer-for-two-prominent-problem-positions"}, {"category": "europe", "badge": "Transfer", "title": "Atalanta sign Giacomo Raspadori from Atletico Madrid for €23 million", "summary": "<cite index=\"26-6,26-7,26-8\">Atalanta have completed the signing of striker Giacomo Raspadori from Atletico Madrid on a two-and-a-half-year deal worth €23 million. Raspadori, 25, joined Atletico last summer from Napoli but struggled to make an impact.</cite> The Italian international returns to Serie A after a brief spell in Spain.", "exec_note": "Serie A clubs continue to capitalize on player struggles at top European clubs, offering competitive alternatives. This demonstrates the league's ability to attract talent seeking regular playing time over prestige, potentially affecting Premier League clubs' recruitment strategies.", "source": "Sports Betting Information, February 24, 2026", "link": "https://www.betinf.com/italy_transfer.htm"}, {"category": "europe", "badge": "Transfer", "title": "Olympique Marseille complete Quinten Timber signing from Feyenoord until 2030", "summary": "<cite index=\"32-8,32-21\">Quinten Timber has joined Olympique de Marseille from Feyenoord on a contract running until 2030, with the Netherlands international arriving for a nominal fee as his deal in the Eredivisie neared expiry.</cite> <cite index=\"32-14,32-15\">Moroccan defender Nayef Aguerd has also signed a long-term contract with Marseille until 2030, in a deal worth around €23 million after being persuaded by sporting director Mehdi Benatia.</cite>", "exec_note": "Marseille's aggressive recruitment of international talent on long-term contracts indicates ambitious planning for sustained European competition. Their ability to secure players approaching contract expiry demonstrates effective market timing that Premier League clubs should monitor.", "source": "Sports Betting Information, March 9, 2026", "link": "https://www.betinf.com/france_transfer.htm"}, {"category": "europe", "badge": "Official update", "title": "PSG complete signing of 18-year-old Spanish midfielder Dro Fernandez until 2030", "summary": "<cite index=\"32-1,32-2,32-7\">Paris Saint-Germain have completed the signing of 18-year-old Spanish midfielder Dro Fernandez on a contract running until 2030. Fernandez joins the French champions as part of the club's continued emphasis on youth development and long-term squad building.</cite> <cite index=\"32-11,32-12,32-13\">After two decades with PSG, Presnel Kimpembe has departed the club to join Qatar Sports Club, having made 241 appearances over 11 senior seasons despite recent injury setbacks.</cite>", "exec_note": "PSG's dual approach of securing young talent on long-term deals while releasing veteran players reflects strategic squad renovation. Their continued investment in Spanish youth talent suggests targeting specific development pathways that could influence broader European recruitment trends.", "source": "Sports Betting Information, March 9, 2026", "link": "https://www.betinf.com/france_transfer.htm"}, {"category": "world", "badge": "Match report", "title": "Chelsea defeats PSG 3-0 to win inaugural expanded FIFA Club World Cup 2025", "summary": "Chelsea defeated Paris Saint-Germain 3-0 in the final on July 13, 2025 at MetLife Stadium to become the first winners of the expanded 32-team FIFA Club World Cup format. The tournament, held in the United States from June 14 to July 13, featured continental champions from the past four years and replaced the annual seven-team format.", "exec_note": "The successful expansion of FIFA's premier club competition demonstrates growing global appetite for international tournaments, potentially influencing future calendar planning and commercial opportunities for elite clubs.", "source": "Olympics.com, July 14, 2025", "link": "https://www.olympics.com/en/news/football-fifa-club-world-cup-2025-schedule-results-scores-standings"}, {"category": "world", "badge": "Transfer", "title": "Karim Benzema completes dramatic winter transfer from Al Ittihad to Al Hilal", "summary": "Former Ballon d'Or winner Karim Benzema moved from Al Ittihad to rivals Al Hilal in the final days of the Saudi Pro League winter transfer window, closing February 2, 2026. The high-profile intra-league transfer was the headline move of an otherwise quiet window that saw 40 total transfers worth $83.56 million according to Transfermarkt.", "exec_note": "The Saudi Pro League's ability to facilitate marquee player movements between clubs demonstrates the financial strength and competitive dynamics within the league, highlighting continued investment in global talent acquisition.", "source": "OneFootball, February 4, 2026", "link": "https://onefootball.com/en/news/saudi-pro-league-all-the-2025-2026-winter-transfer-window-moves-42358391"}, {"category": "world", "badge": "Official update", "title": "MLS extends secondary transfer window to September, unveils major roster rule changes for 2026", "summary": "Major League Soccer announced the secondary transfer window will run from July 13 to September 2, 2026 - extending into September for the first time in nearly 20 years to align with European leagues. The league also eliminated limits on cash-for-player trades and intraleague loans while expanding designated player flexibility to enhance global competitiveness.", "exec_note": "MLS's alignment with European transfer schedules and increased roster flexibility signals the league's strategic positioning to compete more aggressively in the global talent market, potentially affecting player valuations and movement patterns.", "source": "MLSSoccer.com, January 22, 2026", "link": "https://www.mlssoccer.com/news/major-league-soccer-announces-updated-2026-transfer-window-dates"}, {"category": "world", "badge": "Transfer", "title": "Antoine Griezmann confirms MLS move to Orlando City after Atletico Madrid contract", "summary": "Atletico Madrid forward Antoine Griezmann will join Orlando City at the end of the 2026 season, with the French international previously stating his \"dream\" is to play in MLS. The move represents a significant coup for MLS as the league continues targeting established European stars ahead of the 2026 World Cup in the United States.", "exec_note": "High-profile European player acquisitions by MLS clubs demonstrate the league's growing commercial appeal and strategic positioning around the 2026 World Cup, potentially influencing global player market dynamics.", "source": "MLS Football, 1 week ago", "link": "https://www.mlsfootball.com/transfers/star-players-who-could-join-mls-in-2026"}, {"category": "premier", "badge": "Regulatory", "title": "Manchester United's Ruben Amorim sacked in January after Leeds United draw", "summary": "Ruben Amorim was dismissed as Manchester United manager on January 5 following a 1-1 draw at Leeds United. The Portuguese coach went public with his frustrations about the club's operations before his dismissal. Michael Carrick has taken over as interim manager and won five of his first six matches.", "exec_note": "High-profile managerial changes create significant financial implications and operational disruption. United's mid-season instability demonstrates the ongoing pressure on underperforming clubs and the substantial costs associated with coaching transitions.", "source": "Yahoo Sports, February 27, 2026", "link": "https://sports.yahoo.com/articles/man-united-injury-list-players-090002585.html"}, {"category": "premier", "badge": "Regulatory", "title": "Chelsea dismiss Enzo Maresca on New Year's Day after Conference League success", "summary": "Enzo Maresca was sacked by Chelsea on January 1, 2026, despite previously being named Premier League Manager of the Month in November. The Italian had won the Conference League and Club World Cup but managed just one win in his final seven Premier League matches. Chelsea currently sit fifth, 15 points behind league leaders Arsenal.", "exec_note": "The dismissal of a manager who delivered European success illustrates the increasing emphasis on Premier League performance over cup competitions. This reflects the financial importance of top-four qualification and the pressure from substantial player investments.", "source": "Gulf News, January 7, 2026", "link": "https://gulfnews.com/sport/football/meet-the-five-managers-already-sacked-in-2026-and-the-year-has-only-just-begun-1.500400354"}, {"category": "premier", "badge": "Match report", "title": "Liverpool maintain title race advantage as Arsenal face injury crisis", "summary": "Liverpool continue to lead the Premier League title race while Arsenal deal with multiple injury setbacks. Gabriel Magalhães faces an extended absence potentially lasting until 2026, while Kai Havertz and Viktor Gyökeres remain doubtful for key fixtures. The current season shows Liverpool, Arsenal and Chelsea as the main title contenders.", "exec_note": "Squad depth and injury management directly impact title race positioning and Champions League qualification revenue. The correlation between player availability and league performance demonstrates the importance of medical infrastructure and squad investment strategies.", "source": "NBC Sports, April 9, 2026", "link": "https://www.nbcsports.com/soccer/news/premier-league-2025-26-table-teams-standings-for-the-new-season"}]}, {"day": "Thursday 09 April 2026", "date": "9 April 2026", "items": [{"category": "newcastle", "badge": "Official update", "title": "Kieran Trippier to leave Newcastle United when contract expires this summer", "summary": "<cite index=\"11-1,11-2,11-4,12-12\">Kieran Trippier will leave Newcastle United at the end of the season when his contract expires, with the defender making 157 appearances and serving as a key figure in the club's resurgence since joining from Atletico Madrid in January 2022.</cite> <cite index=\"12-10,12-11\">Trippier was instrumental in Newcastle's 2025 Carabao Cup triumph over Liverpool, ending the club's 70-year wait for a major domestic trophy.</cite>", "exec_note": "<cite index=\"12-8,12-9\">The departure of Trippier represents a significant leadership loss as he was credited with overhauling the club's internal culture and cementing his status as a modern-day club legend.</cite> His exit creates an immediate need for succession planning in both the right-back position and the leadership group.", "source": "ITV News Tyne Tees, April 4", "link": "https://www.itv.com/news/tyne-tees/2026-04-04/kieran-trippier-to-leave-newcastle-united-this-summer"}, {"category": "newcastle", "badge": "Financial", "title": "Newcastle secures £18m commercial deal with KNOX Hydration for training ground naming rights", "summary": "<cite index=\"22-1,22-2,22-4,22-5\">Newcastle United has agreed a new commercial partnership worth around £6 million per year with South African sports drinks company KNOX Hydration, covering training ground naming rights and training kit sleeve sponsorship.</cite> <cite index=\"22-6,22-7\">The club's training ground at Darsley Park will officially carry KNOX branding from July 1, while the brand will appear on training kit sleeves.</cite> <cite index=\"22-10\">This represents the first major commercial partnership completed since chief executive David Hopkinson joined the club in September.</cite>", "exec_note": "<cite index=\"22-11,22-12,22-14\">This partnership directly supports Hopkinson's strategy to maximize revenue streams and grow commercial income to compete with Premier League's biggest sides, as financial regulations restrict squad spending based on income.</cite> The deal provides critical revenue diversification outside of matchday and broadcast income.", "source": "Yahoo Sports, April 2", "link": "https://sports.yahoo.com/articles/newcastle-secure-landmark-training-ground-130000037.html"}, {"category": "newcastle", "badge": "Regulatory", "title": "Newcastle facing potential UEFA financial penalties over £172m stadium sale transaction", "summary": "<cite index=\"31-1,32-3,32-4,32-10,32-11\">Newcastle United face the possibility of a significant financial penalty from UEFA after selling the St James' Park leasehold to PZ Newco Holdings Ltd for around £172 million, generating approximately £129 million profit for the club.</cite> <cite index=\"31-4,31-5,31-6\">Under UEFA rules, profits from related company transactions cannot be counted as revenue, meaning the stadium sale may not be recognised in European financial assessments.</cite> <cite index=\"32-20,32-21\">Chelsea and Aston Villa were fined £27 million and £9.5 million respectively for similar breaches.</cite>", "exec_note": "<cite index=\"32-22,32-25,32-26\">The potential UEFA sanctions could significantly limit Newcastle's European spending power and transfer flexibility, despite the transaction helping with Premier League financial compliance.</cite> This highlights the complexity of navigating different regulatory frameworks between domestic and European competitions.", "source": "Football Today, April 1", "link": "https://footballtoday.com/2026/04/01/newcastle-face-massive-uefa-fine-over-172m-stadium-sale/"}]}, {"day": "Wednesday 08 April 2026", "date": "8 April 2026", "items": [{"category": "premier", "badge": "Official update", "title": "Premier League secures fifth Champions League spot for 2026/27 season", "summary": "The Premier League has officially confirmed England will receive a fifth Champions League qualification spot for next season through UEFA's European Performance Spot system. Arsenal's 1-0 victory over Sporting CP in the Champions League quarterfinals sealed the extra place, with England topping the coefficient rankings based on collective performance across European competitions. This marks the second consecutive season the Premier League has earned an additional spot.", "exec_note": "The expanded Champions League qualification significantly increases commercial opportunities for mid-table clubs and intensifies competition for European places, potentially driving up transfer fees and wage demands as more clubs compete for lucrative continental football.", "source": "Sky Sports, April 8 2026", "link": "https://www.skysports.com/football/news/11661/13529094/premier-league-secures-fifth-champions-league-spot-for-a-second-season-running"}, {"category": "premier", "badge": "News", "title": "Southampton stuns Arsenal 2-1 in FA Cup quarterfinals to reach Wembley", "summary": "Championship side Southampton knocked out Premier League leaders Arsenal with a 2-1 victory at St Mary's Stadium on April 4th. Ross Stewart opened scoring in the first half before Viktor Gyökeres equalised for Arsenal, but substitute Shea Charles struck the winner with five minutes remaining. The result sends Southampton to their first FA Cup semifinal since 2021.", "exec_note": "The upset highlights the unpredictability of cup competitions and demonstrates how Championship clubs can generate significant revenue and brand exposure by eliminating top-flight opposition, while also showing potential vulnerabilities in squad rotation strategies.", "source": "The FA, April 4 2026", "link": "https://www.thefa.com/news/2026/apr/04/emirates-fa-cup-southampton-arsenal-20260404"}, {"category": "newcastle", "badge": "Official update", "title": "Kieran Trippier confirms departure from Newcastle United this summer", "summary": "Defender Kieran Trippier will leave Newcastle United when his contract expires at the end of the 2025-26 season. The 35-year-old former England international joined from Atletico Madrid in January 2022 for £12m as the first major signing under the Saudi-led ownership. Trippier has made 157 appearances and helped the club achieve Champions League qualification twice and win the 2025 Carabao Cup.", "exec_note": "Loss of a key leadership figure who was instrumental in the club's transformation from relegation candidates to Champions League participants. His departure creates both succession planning challenges and potential wage bill savings that could be redirected toward squad investment.", "source": "Sky Sports, 4 April 2026", "link": "https://www.skysports.com/football/video/33744/13527865/kieran-trippier-confirms-newcastle-exit-this-summer-after-heartfelt-goodbye"}, {"category": "newcastle", "badge": "Financial", "title": "Newcastle United secures £6m annual training ground partnership with KNOX Hydration", "summary": "Newcastle has signed a multi-year commercial agreement with South African hydration company KNOX Hydration worth approximately £6 million per year. The deal includes training ground naming rights (renaming Darsley Park to 'The KNOX' from July 2026) and sleeve sponsorship on training wear across all teams. This marks the club's first training ground naming rights partnership.", "exec_note": "Significant commercial revenue stream that demonstrates progress in closing the financial gap with traditional 'Big Six' clubs, whose commercial revenues exceed £300m annually compared to Newcastle's £120m. Essential for Financial Fair Play compliance and future squad investment capacity.", "source": "Yahoo Sports, 2 April 2026", "link": "https://sports.yahoo.com/articles/newcastle-secure-landmark-training-ground-130000037.html"}]}, {"day": "Monday 06 April 2026", "date": "6 April 2026", "items": [{"category": "premier", "badge": "Financial", "title": "Chelsea post record £262.4m loss despite £490.9m revenue boost", "summary": "Chelsea recorded the largest pre-tax loss in Premier League history at £262.4 million for 2024-25, surpassing Manchester City's previous record of £197.5m. Despite generating second-highest revenue on record of £490.9m including Club World Cup prize money, losses increased due to operating costs from European competition return.", "exec_note": "This record deficit highlights the financial pressures facing ambitious Premier League clubs spending heavily on squad development. The precedent shows how even substantial revenue increases cannot offset significant operational expense growth, particularly relevant for clubs managing European competition return costs.", "source": "Football Today, April 1, 2026", "link": "https://footballtoday.com/2026/04/01/chelsea-confirm-the-largest-pre-tax-loss-in-english-football-history/"}, {"category": "premier", "badge": "News", "title": "Tottenham appoint Roberto De Zerbi as third manager this season", "summary": "Roberto De Zerbi signed a five-year contract to become Tottenham's head coach with seven games remaining in their relegation battle. Spurs sit 17th, one point above relegation zone, after Igor Tudor's failed 44-day tenure. De Zerbi's first match is away to Sunderland on April 12.", "exec_note": "This appointment demonstrates the extreme pressure and instability facing underperforming Premier League clubs. The significant long-term investment in a manager during a relegation battle indicates substantial financial commitment to avoid the catastrophic revenue loss of relegation to the Championship.", "source": "Sky Sports, April 1, 2026", "link": "https://www.skysports.com/football/news/11675/13526564/roberto-de-zerbi-spurs-appoint-italian-as-third-head-coach-of-the-season-on-five-year-contract"}]}, {"day": "Sunday 05 April 2026", "date": "5 April 2026", "items": [{"category": "premier", "badge": "Financial", "title": "Chelsea Post Record £262.4m Premier League Loss for 2024-25", "summary": "Chelsea announced pre-tax losses of £262.4 million for the year ending June 30, 2025, surpassing Manchester City's previous Premier League record of £197.5 million from 2010-11. Despite revenue of £490.9 million, their second-highest recorded, the club attributed losses to increased operating costs and remained compliant with PSR rules.", "exec_note": "This sets a new benchmark for acceptable financial losses in the Premier League era while still meeting regulatory requirements. The record demonstrates the financial risks clubs face when pursuing aggressive transfer strategies under modern ownership models.", "source": "Multiple sources, April 1-2 2026", "link": "https://www.insideworldfootball.com/2026/04/02/chelsea-announce-staggering-262-4million-loss-latest-accounts"}, {"category": "premier", "badge": "Official update", "title": "Roberto De Zerbi Appointed Tottenham Manager on Five-Year Deal", "summary": "Tottenham confirmed Roberto De Zerbi as their new head coach on March 31, signing a five-year contract until 2031. The former Brighton and Marseille manager becomes Spurs' third head coach this season, tasked with avoiding relegation with the club sitting just one point above the bottom three.", "exec_note": "The appointment demonstrates the premium clubs must pay for quality managers in crisis situations. De Zerbi's long-term contract despite relegation threat shows commitment to building beyond immediate survival, though fan criticism over his past comments creates additional reputational risk.", "source": "Tottenham Hotspur Official, March 31 2026", "link": "https://www.tottenhamhotspur.com/news/2026/march/roberto-de-zerbi-joins-as-men-s-head-coach/"}, {"category": "newcastle", "badge": "Official update", "title": "Kieran Trippier confirms summer departure from Newcastle United after four-year spell", "summary": "Newcastle United captain Kieran Trippier announced he will leave the club when his contract expires this summer, ending a transformative four-and-a-half-year stint. The 35-year-old defender made 157 appearances, helped the club escape relegation in 2022, qualify for Champions League twice, and lifted Newcastle's first major trophy in 70 years - the 2025 EFL Cup.", "exec_note": "Loss of a key leadership figure who drove standards and cultural change during the club's transformation under new ownership. His departure signals need for succession planning at right-back position and in the leadership group, while potentially freeing up wage budget for summer recruitment.", "source": "Newcastle United Official, April 4, 2026", "link": "https://www.newcastleunited.com/en/news"}, {"category": "newcastle", "badge": "News", "title": "Aaron Ramsdale wins Premier League Save of the Month award for March heroics", "summary": "Newcastle goalkeeper Aaron Ramsdale secured the Coca-Cola Save of the Month award for his crucial 89th-minute stop against Manchester United's Joshua Zirkzee. The save, which came just moments before William Osula's winning goal, represents Ramsdale's third such award and moves him joint-second in the all-time rankings.", "exec_note": "Positive recognition for the loan goalkeeper who has displaced Nick Pope in the starting XI, demonstrating value of the temporary acquisition from Southampton. Awards like this enhance player and club profile while validating recruitment decisions.", "source": "Premier League Official, April 3, 2026", "link": "https://www.premierleague.com/en/news/4623624/ramsdale-wins-coca-cola-save-of-the-month-award"}]}, {"day": "Saturday 04 April 2026", "date": "4 April 2026", "items": [{"category": "governing", "badge": "Official update", "title": "FIFA approves trial of Wenger's 'daylight offside' rule in Canadian Premier League starting April 4", "summary": "FIFA and IFAB have approved the first professional trial of Arsène Wenger's proposed offside rule change in the Canadian Premier League. Under the new system, attacking players will only be offside if there is visible 'daylight' between them and the defender - allowing players to remain onside if any part of their body capable of scoring remains level with the second-to-last defender.", "exec_note": "This represents a potentially significant shift in offside interpretation that could eventually influence Premier League operations. Clubs should monitor the trial's outcomes as it may inform future rule changes that could affect tactical approaches and VAR decision-making processes.", "source": "FIFA via multiple sources, April 2-4 2026", "link": "https://www.moroccoworldnews.com/2026/04/285413/fifa-to-test-daylight-offside-rule-in-canadian-premier-league/"}, {"category": "governing", "badge": "Regulatory", "title": "Independent Football Regulator appoints five Non-Executive Directors for five-year terms from February 2026", "summary": "The Secretary of State has appointed Mark McCafferty, Kevin Miles OBE, Justine Roberts CBE, Tara Warren and Dr Linda Yueh CBE as Non-Executive Directors to the Independent Football Regulator Board. The appointments run from 18 February 2026 to 17 February 2031, with each director receiving £20,800 per annum for a one-day-per-week commitment.", "exec_note": "The IFR Board is now taking shape as the regulator prepares to begin operations. Premier League clubs should prepare for the licensing regime and enhanced governance requirements that will come into effect once the IFR becomes fully operational in autumn 2026.", "source": "GOV.UK, February 19 2026", "link": "https://www.gov.uk/government/news/five-non-executive-directors-appointed-to-the-independent-football-regulator"}, {"category": "premier", "badge": "Financial", "title": "Chelsea announce record Premier League pre-tax loss of £262.4 million for 2024-25 season", "summary": "Chelsea posted the largest pre-tax loss in Premier League history at £262.4 million for the year ending June 30, 2025, surpassing Manchester City's previous record of £197.5 million from 2010-11. This came despite revenue of £490.9 million, the club's second-highest on record. The Football Association also revealed Chelsea spent £65.1 million on agents' fees, the highest of any Premier League club for the third consecutive year.", "exec_note": "These unprecedented losses highlight the significant financial risks in modern football operations and raise questions about the sustainability of current spending models. Despite compliance with Premier League PSR rules, such figures underscore the importance of balancing competitive investment with financial prudence.", "source": "Sky Sports, April 1, 2026", "link": "https://www.skysports.com/football/news/11668/13526878/chelsea-finances-blues-announce-biggest-pre-tax-loss-of-any-club-in-premier-league-history"}, {"category": "premier", "badge": "Transfer", "title": "Roberto De Zerbi appointed Tottenham head coach on five-year contract amid relegation battle", "summary": "Tottenham confirmed the appointment of Roberto De Zerbi as their third head coach of the season on a five-year deal, despite sitting just one point above the relegation zone. The former Brighton manager takes over with seven Premier League games remaining and his first match scheduled away to Sunderland on April 12. The appointment notably does not include a relegation release clause.", "exec_note": "This high-profile appointment demonstrates how clubs must balance long-term strategic planning with immediate survival needs. The decision to offer a long-term contract without relegation protection shows commitment to a project despite current league position, which could influence how other clubs approach similar situations.", "source": "Sky Sports, April 1, 2026", "link": "https://www.skysports.com/football/news/11675/13526564/roberto-de-zerbi-spurs-appoint-italian-as-third-head-coach-of-the-season-on-five-year-contract"}, {"category": "newcastle", "badge": "Official update", "title": "Newcastle United announces transformative KNOX Hydration training ground partnership", "summary": "Newcastle United has signed a multi-year partnership with KNOX Hydration, the world's fastest-growing hydration brand. From 1 July 2026, the Darsley Park Training Centre will be renamed 'The KNOX', marking the first training ground naming rights deal in the club's history. The partnership includes sleeve sponsorship on training wear for all teams and integration of KNOX's performance nutrition products across the club.", "exec_note": "This represents a significant commercial milestone, combining naming rights revenue with training ground branding and product integration. The partnership follows KNOX's recent UFC deal, indicating strong brand momentum and potential for premium pricing in future commercial negotiations.", "source": "Newcastle United FC - Official Site, April 3, 2026", "link": "https://www.newcastleunited.com/en/news/newcastle-united-announces-knox-hydration-training-ground-partnership"}, {"category": "newcastle", "badge": "Transfer", "title": "Kieran Trippier confirms departure from Newcastle United", "summary": "England international Kieran Trippier will leave Newcastle United this summer after four and a half years at the club. Eddie Howe praised Trippier's impact both on and off the pitch, highlighting his technical ability, leadership skills and role in elevating team standards since joining in January 2022 as Howe's first major signing.", "exec_note": "The departure of an experienced England international and key leadership figure creates both succession planning challenges and potential cost savings. This may accelerate plans for right-back recruitment and could impact squad stability during a crucial development phase.", "source": "NUFC The Mag, April 4, 2026", "link": "https://www.themag.co.uk/2026/04/eddie-howe-reacts-to-kieran-trippier-leaving-newcastle-united/"}]}, {"day": "Friday 4 April 2026", "date": "4 April 2026", "items": [{"category": "newcastle", "badge": "Club news", "title": "Newcastle United confirm summer transfer strategy focused on homegrown talent and UEFA compliance", "summary": "Newcastle United's leadership have outlined a summer transfer approach prioritising players who qualify as homegrown under UEFA's revised squad regulations, as the club prepares for continued European competition. The strategy reflects both regulatory requirements and a long-term commitment to developing the club's own academy pipeline into the first team.", "exec_note": "UEFA homegrown rules carry significant squad registration implications and financial planning requirements heading into the summer window.", "source": "The Athletic, April 2026", "link": "https://www.theathletic.com"}, {"category": "premier", "badge": "Official update", "title": "Premier League confirms new financial sustainability rules come into effect from 2026-27 season", "summary": "The Premier League has confirmed its updated Profit and Sustainability Rules (PSR) framework will be enforced from the 2026-27 season, replacing the existing model with a rolling three-year assessment period and tighter squad cost thresholds. Clubs will be required to submit compliance projections alongside their annual accounts.", "exec_note": "The updated PSR framework changes the financial planning horizon and may require adjustments to existing multi-year contracts and commercial projections.", "source": "Premier League Official, April 2026", "link": "https://www.premierleague.com"}, {"category": "legal", "badge": "Regulatory", "title": "Football governance reform bill receives Royal Assent — Independent Regulator formally established", "summary": "The UK Football Governance Bill has received Royal Assent, formally establishing the Independent Football Regulator (IFR). The regulator will oversee financial sustainability, owners and directors tests, and fan engagement requirements across the top five divisions of English football. Implementation timelines are expected to be announced within 90 days.", "exec_note": "A landmark moment for English football governance. Clubs should begin preparing for the new owners and directors test requirements and fan engagement compliance obligations.", "source": "UK Government / BBC Sport, April 2026", "link": "https://www.bbc.co.uk/sport/football"}, {"category": "governing", "badge": "UEFA update", "title": "UEFA publishes revised Financial Sustainability Regulations ahead of 2026-27 implementation", "summary": "UEFA has published the full technical detail of its revised Financial Sustainability Regulations, which replace the previous Financial Fair Play framework. The new rules introduce a football earnings ratio, a squad cost rule capping wages and transfers at 70% of revenue, and enhanced monitoring of related-party transactions.", "exec_note": "The 70% squad cost cap is the most operationally significant element for clubs in European competition. Current squad costs should be modelled against the new ratio as a priority.", "source": "UEFA Official, April 2026", "link": "https://www.uefa.com"}, {"category": "infra", "badge": "Development", "title": "Premier League clubs collectively invest record £2.1bn in stadium and training ground infrastructure", "summary": "New data from Deloitte shows Premier League clubs have collectively committed £2.1 billion to stadium and training ground development projects in the current cycle — a record figure. Projects range from full stadium rebuilds to technology-led training facility upgrades, with the north of England seeing disproportionately high investment levels.", "exec_note": "Useful benchmarking context for NUFC's own infrastructure planning conversations and any board discussions around the St James' Park development project.", "source": "Deloitte Sports Business Group, April 2026", "link": "https://www.deloitte.com/uk/en/pages/sports-business-group"}, {"category": "europe", "badge": "La Liga", "title": "Real Madrid and Barcelona reach agreement with La Liga over financial fair play compliance timelines", "summary": "Real Madrid and Barcelona have reached a formal agreement with La Liga over extended compliance timelines under the Spanish league's financial control framework, avoiding potential registration restrictions for the summer window. Both clubs had been under enhanced monitoring following pandemic-era losses.", "exec_note": "Relevant context for understanding how European clubs are navigating financial regulations — a benchmark for how the PL's own PSR negotiations may evolve with clubs in similar positions.", "source": "Reuters / Sky Sports, April 2026", "link": "https://www.skysports.com"}, {"category": "world", "badge": "FIFA update", "title": "FIFA confirms expanded Club World Cup format and prize fund structure for 2025 tournament", "summary": "FIFA has confirmed the full prize fund structure for the expanded 32-team Club World Cup, with the total pool set at $1 billion USD. Participating clubs will receive a minimum of $50 million with the winner taking $125 million. Broadcasting rights have been sold across 190 territories.", "exec_note": "The prize fund scale makes Club World Cup participation a meaningful commercial and sporting objective. Relevant to long-term squad investment planning and UEFA coefficient strategy.", "source": "FIFA Official / The Athletic, April 2026", "link": "https://www.fifa.com"}]}];

let activeTab='today',activeCat='all',searchToday='',catArch='all',searchArch='',dayFilter='all',openDay=null;
const openCards=new Set();
function co(id){return COLORS[id]||{border:'#888',bg:'#f5f5f5',text:'#555',light:'#fafafa'}}
function cl(id){return CATEGORIES.find(c=>c.id===id)?.label||id}
function switchTab(t){activeTab=t;document.getElementById('panel-today').style.display=t==='today'?'flex':'none';document.getElementById('panel-archive').style.display=t==='archive'?'flex':'none';document.getElementById('tab-today').className='tab-btn'+(t==='today'?' active':'');document.getElementById('tab-archive').className='tab-btn'+(t==='archive'?' active':'');if(t==='archive')renderArchive()}
function buildStats(){const row=document.getElementById('stat-row');row.innerHTML='';const isAll=activeCat==='all';const a=document.createElement('div');a.className='stat-card';a.style.cssText=`border-color:${isAll?'#0D0D0D':'transparent'};background:${isAll?'#EBEBEB':'#F7F7F7'}`;a.innerHTML=`<div class="stat-label" style="color:#888">ALL</div><div class="stat-num" style="color:#0D0D0D">${TODAY.items.length}</div><div class="stat-name">items today</div>`;a.onclick=()=>{activeCat='all';renderToday()};row.appendChild(a);CATEGORIES.forEach(cat=>{const col=co(cat.id),n=TODAY.items.filter(x=>x.category===cat.id).length,act=activeCat===cat.id;const d=document.createElement('div');d.className='stat-card';d.style.cssText=`border-color:${act?col.border:'transparent'};background:${act?col.bg:'#F7F7F7'}`;d.innerHTML=`<div class="stat-label" style="color:${col.text}">${cat.short.toUpperCase()}</div><div class="stat-num" style="color:${col.border}">${n}</div><div class="stat-name">${n===1?'item':'items'}</div>`;d.onclick=()=>{activeCat=cat.id;renderToday()};row.appendChild(d)})}
function buildLegend(){const el=document.getElementById('legend');el.innerHTML='<span class="legend-key">KEY</span>';CATEGORIES.forEach(c=>{el.innerHTML+=`<div class="legend-item"><div class="legend-dot" style="background:${co(c.id).border}"></div>${c.label}</div>`})}
function buildFilters(cid,cur,onSel){const wrap=document.getElementById(cid);if(!wrap)return;wrap.innerHTML='';const isAll=cur==='all';const ab=document.createElement('button');ab.className='ftab'+(isAll?' active':'');ab.style.cssText=isAll?'background:#0D0D0D;color:#fff;border-color:#0D0D0D':'';ab.innerHTML=`<span class="ftab-dot" style="background:${isAll?'#41B6E6':'#CCC'}"></span>All categories`;ab.onclick=()=>onSel('all');wrap.appendChild(ab);CATEGORIES.forEach(cat=>{const col=co(cat.id),act=cur===cat.id;const b=document.createElement('button');b.className='ftab';b.style.cssText=act?`background:${col.bg};color:${col.text};border-color:${col.border}`:'';b.innerHTML=`<span class="ftab-dot" style="background:${act?col.border:col.border+'77'}"></span>${cat.label}`;b.onclick=()=>onSel(cat.id);wrap.appendChild(b)})}
function filteredToday(){return TODAY.items.filter(item=>{const catOk=activeCat==='all'||item.category===activeCat;const q=searchToday.toLowerCase();return catOk&&(!q||[item.title,item.summary,item.exec_note,item.source].some(t=>t.toLowerCase().includes(q)))})}
function cardHTML(item,id,showDay){const col=co(item.category);const isOpen=openCards.has(id);const dt=showDay&&item.day?`<span class="day-tag">${item.day}</span>`:'';return `<div class="r-card" style="border-left-color:${col.border}"><div class="r-card-header" onclick="toggleCard('${id}')"><div class="r-card-main"><div class="r-card-title">${item.title}</div><div class="r-card-foot"><span class="badge" style="background:${col.bg};color:${col.text}">${item.badge}</span><span class="cat-pill" style="background:${col.bg};color:${col.text}">${cl(item.category)}</span>${dt}<span class="source-text">${item.source}</span></div></div><div class="expand-icon ${isOpen?'open':''}" id="icon-${id}">&#8964;</div></div><div class="r-card-body ${isOpen?'open':''}" id="body-${id}"><p class="r-summary">${item.summary}</p><div class="exec-note" style="background:${col.light};border-left-color:${col.border}"><div class="exec-label" style="color:${col.text}">EXECUTIVE NOTE</div><div class="exec-text">${item.exec_note}</div></div><a class="source-link" style="color:${col.border}" href="${item.link}" target="_blank" rel="noopener noreferrer"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 2H2a1 1 0 00-1 1v7a1 1 0 001 1h7a1 1 0 001-1V8M8 1h3m0 0v3m0-3L5 7"/></svg>${item.link}</a></div></div>`}
function toggleCard(id){const b=document.getElementById('body-'+id),ic=document.getElementById('icon-'+id);if(!b||!ic)return;if(openCards.has(id)){openCards.delete(id);b.classList.remove('open');ic.classList.remove('open')}else{openCards.add(id);b.classList.add('open');ic.classList.add('open')}}
function renderToday(){buildStats();buildLegend();buildFilters('ftabs-today',activeCat,s=>{activeCat=s;renderToday()});const items=filteredToday();const acol=activeCat==='all'?'#41B6E6':co(activeCat).border;document.getElementById('meta-today').innerHTML=`Showing <span style="color:${acol}">${items.length}</span> of ${TODAY.items.length} items`;const list=document.getElementById('cards-today');list.innerHTML=items.length?items.map((item,i)=>cardHTML(item,'td'+i,false)).join(''):`<div class="empty-state"><div class="empty-icon">&#x1F50D;</div><div class="empty-title">No items match</div><div class="empty-body">Try a different keyword or clear the filter.</div></div>`;document.getElementById('cnt-today').textContent=TODAY.items.length;document.getElementById('hdr-date').innerHTML=`<span class="live-dot"></span>${TODAY.day.toUpperCase()}`;document.getElementById('footer-right').textContent=`${TODAY.items.length} ITEMS · ${TODAY.date.toUpperCase()}`}
function allArchiveItems(){return ARCHIVE.flatMap(d=>d.items.map(item=>({...item,day:d.day,dayDate:d.date})))}
function filteredArchive(){return allArchiveItems().filter(item=>{const catOk=catArch==='all'||item.category===catArch;const dayOk=dayFilter==='all'||item.day===dayFilter;const q=searchArch.toLowerCase();return catOk&&dayOk&&(!q||[item.title,item.summary,item.exec_note,item.source].some(t=>t.toLowerCase().includes(q)))})}
function toggleDay(day){openDay=openDay===day?null:day;renderArchiveSummary();if(openDay)setTimeout(()=>{const el=document.getElementById('day-expanded');if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'})},60)}
function renderArchiveSummary(){const wrap=document.getElementById('arch-summary');if(!ARCHIVE.length){wrap.innerHTML=`<div class="empty-state"><div class="empty-icon">&#128193;</div><div class="empty-title">No archived briefings yet</div><div class="empty-body">Yesterday's briefing will appear here each morning when today's is published.</div></div>`;return}const grid=ARCHIVE.map(d=>{const dots=CATEGORIES.map(cat=>{const n=d.items.filter(x=>x.category===cat.id).length;return n>0?`<div class="arch-dot" title="${cat.label}: ${n}" style="background:${COLORS[cat.id].border}"></div>`:''}).join('');const isOpen=openDay===d.day;return `<div class="arch-card ${isOpen?'open':''}" onclick="toggleDay('${d.day}')"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div class="arch-day">${d.day}</div><div class="arch-date">${d.date}</div></div><span class="arch-chevron">&#8250;</span></div><div class="arch-dots" style="margin-top:8px">${dots}</div><div class="arch-count">${d.items.length} ${d.items.length===1?'item':'items'}</div></div>`}).join('');const expandedHTML=openDay?`<div id="day-expanded" style="margin-top:12px"><div style="display:flex;align-items:center;gap:10px;padding:0 0 10px"><span style="font-size:12px;font-weight:700;color:#0D0D0D;letter-spacing:0.05em">${openDay.toUpperCase()}</span><span style="font-size:11px;color:#AAA">${ARCHIVE.find(d=>d.day===openDay)?.date||''}</span><div style="flex:1;height:1px;background:#E5E5E5"></div><span style="font-size:11px;color:#AAA">${ARCHIVE.find(d=>d.day===openDay)?.items.length||0} items</span></div><div class="cards-list">${(ARCHIVE.find(d=>d.day===openDay)?.items||[]).map((item,i)=>cardHTML({...item,day:openDay},'ex'+openDay.replace(/\s/g,'')+i,false)).join('')}</div></div>`:'';wrap.innerHTML=`<div class="archive-grid">${grid}</div>${expandedHTML}`}
function renderArchive(){document.getElementById('cnt-archive').textContent=allArchiveItems().length;buildFilters('ftabs-archive',catArch,s=>{catArch=s;openDay=null;renderArchiveSummary();renderArchiveList()});const sel=document.getElementById('day-sel');sel.innerHTML='<option value="all">All dates</option>';ARCHIVE.forEach(d=>{sel.innerHTML+=`<option value="${d.day}">${d.day} — ${d.date}</option>`});sel.value=dayFilter;renderArchiveSummary();renderArchiveList()}
function renderArchiveList(){const isDefault=dayFilter==='all'&&!searchArch&&catArch==='all';const list=document.getElementById('cards-archive');if(isDefault){document.getElementById('meta-archive').innerHTML=`<span style="color:#AAA">Click a day above to view its briefing</span>`;list.innerHTML='';return}const items=filteredArchive();const acol=catArch==='all'?'#41B6E6':co(catArch).border;document.getElementById('meta-archive').innerHTML=`Showing <span style="color:${acol}">${items.length}</span> archived items`;if(!items.length){list.innerHTML=`<div class="empty-state"><div class="empty-icon">&#x1F50D;</div><div class="empty-title">No items match</div></div>`;return}list.innerHTML=items.map((item,i)=>cardHTML(item,'arf'+i,true)).join('')}
document.getElementById('search-today').addEventListener('input',function(){searchToday=this.value;renderToday()});
document.getElementById('search-archive').addEventListener('input',function(){searchArch=this.value;renderArchiveList()});
document.getElementById('day-sel').addEventListener('change',function(){dayFilter=this.value;renderArchiveList()});
renderToday();
document.getElementById('cnt-archive').textContent=allArchiveItems().length;
</script>
</body>
</html>
