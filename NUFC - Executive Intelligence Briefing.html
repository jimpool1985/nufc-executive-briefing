.tab-btn:hover{color:#0D0D0D}
.tab-btn.active{color:#0D0D0D;border-bottom-color:#0D0D0D}
.tab-count{display:inline-flex;align-items:center;justify-content:center;background:#F0F0F0;border-radius:20px;font-size:10px;font-weight:700;padding:1px 7px;margin-left:6px;color:#888}
.tab-btn.active .tab-count{background:#0D0D0D;color:#fff}
.dash-body{background:#fff;padding:20px 24px;display:flex;flex-direction:column;gap:16px;border:1px solid #E5E5E5;border-top:none;border-bottom:none}
.legend{display:flex;gap:10px;flex-wrap:wrap;padding:8px 12px;background:#F7F7F7;border-radius:8px;align-items:center}
.legend-key{font-size:10px;font-weight:700;color:#999;letter-spacing:0.06em;margin-right:2px}

.stat-card{border-radius:8px;padding:10px 12px;cursor:pointer;border:2px solid transparent;transition:all 0.15s;background:#F7F7F7}

.stat-name{font-size:10px;margin-top:3px;color:#999}

.search-wrap input:focus{border-color:#41B6E6;background:#fff}

.ftab:hover{background:#F5F5F5;border-color:#BBB}
.ftab-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.results-meta{font-size:12px;color:#AAA}

.cards-list{display:flex;flex-direction:column;gap:8px}
.r-card{border:1px solid #EBEBEB;border-radius:10px;background:#fff;border-left-width:4px;border-left-style:solid;overflow:hidden}

.r-card-title{font-size:13px;font-weight:700;color:#0D0D0D;line-height:1.45;margin-bottom:7px}

.day-tag{font-size:10px;padding:2px 8px;border-radius:20px;border:1px solid #E5E5E5;color:#AAA;white-space:nowrap}
.source-text{font-size:10px;color:#BBB}
.expand-icon{width:22px;height:22px;border-radius:50%;border:1px solid #E5E5E5;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#AAA;font-size:14px;transition:transform 0.2s;margin-top:1px}

.archive-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.arch-card{background:#F7F7F7;border-radius:8px;padding:12px 14px;border:2px solid transparent;cursor:pointer;transition:all 0.15s}

.arch-day{font-size:11px;font-weight:700;color:#0D0D0D;letter-spacing:0.05em;margin-bottom:2px}
.arch-date{font-size:11px;color:#AAA;margin-bottom:8px}
.arch-dots{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.arch-dot{width:9px;height:9px;border-radius:50%}

.empty-state{text-align:center;padding:40px 20px;color:#AAA}
.empty-icon{font-size:28px;margin-bottom:10px}
.empty-title{font-size:14px;font-weight:700;color:#888;margin-bottom:5px}
.empty-body{font-size:13px;line-height:1.6;max-width:380px;margin:0 auto}
.nufc-footer{background:#0D0D0D;border-radius:0 0 10px 10px;padding:11px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.footer-left{font-size:10px;color:#555;letter-spacing:0.04em}
.footer-right{font-size:10px;color:#41B6E6;font-weight:700;letter-spacing:0.06em;white-space:nowrap}
@media(max-width:640px){.stat-row,.archive-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:500px){.nufc-header,.nufc-footer{flex-direction:column;align-items:flex-start;gap:8px}.header-right{text-align:left}}
</style>
</head>

x=\"22-11,22-12,22-14\">This partnership directly supports Hopkinson's strategy to maximize revenue streams and grow commercial income to compete with Premier League's biggest sides, as financial regulations restrict squad spending based on income.</cite> The deal provides critical revenue diversification outside of matchday and broadcast income.", "source": "Yahoo Sports, April 2", "link": "https://sports.yahoo.com/articles/newcastle-secure-landmark-training-ground-130000037.html"}, {"category": "newcastle", "badge": "Regulatory", "title": "Newcastle facing potential UEFA financial penalties over £172m stadium sale transaction", "summary": "<cite index=\"31-1,32-3,32-4,32-10,32-11\">Newcastle United face the possibility of a significant financial penalty from UEFA after selling the St James' Park leasehold to PZ Newco Holdings Ltd for around £172 million, generating approximately £129 million profit for the club.</cite> <cite index=\"31-4,31-5,31-6\">Under UEFA rules, profits from related company transactions cannot be counted as revenue, meaning the stadium sale may not be recognised in European financial assessments.</cite> <cite index=\"32-20,32-21\">Chelsea and Aston Villa were fined £27 million and £9.5 million respectively for similar breaches.</cite>", "exec_note": "<cite index=\"32-22,32-25,32-26\">The potential UEFA sanctions could significantly limit Newcastle's European spending power and transfer flexibility, despite the transaction helping with Premier League financial compliance.</cite> This highlights the complexity of navigating different regulatory frameworks between domestic and European competitions.", "source": "Football Today, April 1", "link": "https://footballtoday.com/2026/04/01/newcastle-face-massive-uefa-fine-over-172m-stadium-sale/"}]};

 2026", "link": "https://sports.yahoo.com/articles/newcastle-secure-landmark-training-ground-130000037.html"}]}, {"day": "Monday 06 April 2026", "date": "6 April 2026", "items": [{"category": "premier", "badge": "Financial", "title": "Chelsea post record £262.4m loss despite £490.9m revenue boost", "summary": "Chelsea recorded the largest pre-tax loss in Premier League history at £262.4 million for 2024-25, surpassing Manchester City's previous record of £197.5m. Despite generating second-highest revenue on record of £490.9m including Club World Cup prize money, losses increased due to operating costs from European competition return.", "exec_note": "This record deficit highlights the financial pressures facing ambitious Premier League clubs spending heavily on squad development. The precedent shows how even substantial revenue increases cannot offset significant operational expense growth, particularly relevant for clubs managing European competition return costs.", "source": "Football Today, April 1, 2026", "link": "https://footballtoday.com/2026/04/01/chelsea-confirm-the-largest-pre-tax-loss-in-english-football-history/"}, {"category": "premier", "badge": "News", "title": "Tottenham appoint Roberto De Zerbi as third manager this season", "summary": "Roberto De Zerbi signed a five-year contract to become Tottenham's head coach with seven games remaining in their relegation battle. Spurs sit 17th, one point above relegation zone, after Igor Tudor's failed 44-day tenure. De Zerbi's first match is away to Sunderland on April 12.", "exec_note": "This appointment demonstrates the extreme pressure and instability facing underperforming Premier League clubs. The significant long-term investment in a manager during a relegation battle indicates substantial financial commitment to avoid the catastrophic revenue loss of relegation to the Championship.", "source": "Sky Sports, April 1, 2026", "link": "https://www.skysports.com/football/news/11675/13526564/roberto-de-zerbi-spurs-appoint-italian-as-third-head-coach-of-the-season-on-five-year-contract"}]}, {"day": "Sunday 05 April 2026", "date": "5 April 2026", "items": [{"category": "premier", "badge": "Financial", "title": "Chelsea Post Record £262.4m Premier League Loss for 2024-25", "summary": "Chelsea announced pre-tax losses of £262.4 million for the year ending June 30, 2025, surpassing Manchester City's previous Premier League record of £197.5 million from 2010-11. Despite revenue of £490.9 million, their second-highest recorded, the club attributed losses to increased operating costs and remained compliant with PSR rules.", "exec_note": "This sets a new benchmark for acceptable financial losses in the Premier League era while still meeting regulatory requirements. The record demonstrates the financial risks clubs face when pursuing aggressive transfer strategies under modern ownership models.", "source": "Multiple sources, April 1-2 2026", "link": "https://www.insideworldfootball.com/2026/04/02/chelsea-announce-staggering-262-4million-loss-latest-accounts"}, {"category": "premier", "badge": "Official update", "title": "Roberto De Zerbi Appointed Tottenham Manager on Five-Year Deal", "summary": "Tottenham confirmed Roberto De Zerbi as their new head coach on March 31, signing a five-year contract until 2031. The former Brighton and Marseille manager becomes Spurs' third head coach this season, tasked with avoiding relegation with the club sitting just one point above the bottom three.", "exec_note": "The appointment demonstrates the premium clubs must pay for quality managers in crisis situations. De Zerbi's long-term contract despite relegation threat shows commitment to building beyond immediate survival, though fan criticism over his past comments creates additional reputational risk.", "source": "Tottenham Hotspur Official, March 31 2026", "link": "https://www.tottenhamhotspur.com/news/2026/march/roberto-de-zerbi-joins-as-men-s-head-coach/"}, {"category": "newcastle", "badge": adian Premier League starting April 4", "summary": "FIFA and IFAB have approved the first professional trial of Arsène Wenger's proposed offside rule change in the Canadian Premier League. Under the new system, attacking players will only be offside if there is visible 'daylight' between them and the defender - allowing players to remain onside if any part of their body capable of scoring remains level with the second-to-last defender.", "exec_note": "This represents a potentially significant shift in offside interpretation that could eventually influence Premier League operations. Clubs should monitor the trial's outcomes as it may inform future rule changes that could affect tactical approaches and VAR decision-making processes.", "source": "FIFA via multiple sources, April 2-4 2026", "link": "https://www.moroccoworldnews.com/2026/04/285413/fifa-to-test-daylight-offside-rule-in-canadian-premier-league/"}, {"category": "governing", "badge": "Regulatory", "title": "Independent Football Regulator appoints five Non-Executive Directors for five-year terms from February 2026", "summary": "The Secretary of State has appointed Mark McCafferty, Kevin Miles OBE, Justine Roberts CBE, Tara Warren and Dr Linda Yueh CBE as Non-Executive Directors to the Independent Football Regulator Board. The appointments run from 18 February 2026 to 17 February 2031, with each director receiving £20,800 per annum for a one-day-per-week commitment.", "exec_note": "The IFR Board is now taking shape as the regulator prepares to begin operations. Premier League clubs should prepare for the licensing regime and enhanced governance requirements that will come into effect once the IFR becomes fully operational in autumn 2026.", "source": "GOV.UK, February 19 2026", "link": "https://www.gov.uk/government/news/five-non-executive-directors-appointed-to-the-independent-football-regulator"}, {"category": "premier", "badge": "Financial", "title": "Chelsea announce record Premier League pre-tax loss of £262.4 million for 2024-25 season", "summary": "Chelsea posted the largest pre-tax loss in Premier League history at £262.4 million for the year ending June 30, 2025, surpassing Manchester City's previous record of £197.5 million from 2010-11. This came despite revenue of £490.9 million, the club's second-highest on record. The Football Association also revealed Chelsea spent £65.1 million on agents' fees, the highest of any Premier League club for the third consecutive year.", "exec_note": "These unprecedented losses highlight the significant financial risks in modern football operations and raise questions about the sustainability of current spending models. Despite compliance with Premier League PSR rules, such figures underscore the importance of balancing competitive investment with financial prudence.", "source": "Sky Sports, April 1, 2026", "link": "https://www.skysports.com/football/news/11668/13526878/chelsea-finances-blues-announce-biggest-pre-tax-loss-of-any-club-in-premier-league-history"}, {"category": "premier", "badge": "Transfer", "title": "Roberto De Zerbi appointed Tottenham head coach on five-year contract amid relegation battle", "summary": "Tottenham confirmed the appointment of Roberto De Zerbi as their third head coach of the season on a five-year deal, despite sitting just one point above the relegation zone. The former Brighton manager takes over with seven Premier League games remaining and his first match scheduled away to Sunderland on April 12. The appointment notably does not include a relegation release clause.", "exec_note": "This high-profile appointment demonstrates how clubs must balance long-term strategic planning with immediate survival needs. The decision to offer a long-term contract without relegation protection shows commitment to a project despite current league position, which could influence how other clubs approach similar situations.", "source": "Sky Sports, April 1, 2026", "link": "https://www.skysports.com/football/news tps://www.themag.co.uk/2026/04/eddie-howe-reacts-to-kieran-trippier-leaving-newcastle-united/"}]}, {"day": "Friday 4 April 2026", "date": "4 April 2026", "items": [{"category": "newcastle", "badge": "Club news", "title": "Newcastle United confirm summer transfer strategy focused on homegrown talent and UEFA compliance", "summary": "Newcastle United's leadership have outlined a summer transfer approach prioritising players who qualify as homegrown under UEFA's revised squad regulations, as the club prepares for continued European competition. The strategy reflects both regulatory requirements and a long-term commitment to developing the club's own academy pipeline into the first team.", "exec_note": "UEFA homegrown rules carry significant squad registration implications and financial planning requirements heading into the summer window.", "source": "The Athletic, April 2026", "link": "https://www.theathletic.com"}, {"category": "premier", "badge": "Official update", "title": "Premier League confirms new financial sustainability rules come into effect from 2026-27 season", "summary": "The Premier League has confirmed its updated Profit and Sustainability Rules (PSR) framework will be enforced from the 2026-27 season, replacing the existing model with a rolling three-year assessment period and tighter squad cost thresholds. Clubs will be required to submit compliance projections alongside their annual accounts.", "exec_note": "The updated PSR framework changes the financial planning horizon and may require adjustments to existing multi-year contracts and commercial projections.", "source": "Premier League Official, April 2026", "link": "https://www.premierleague.com"}, {"category": "legal", "badge": "Regulatory", "title": "Football governance reform bill receives Royal Assent — Independent Regulator formally established", "summary": "The UK Football Governance Bill has received Royal Assent, formally establishing the Independent Football Regulator (IFR). The regulator will oversee financial sustainability, owners and directors tests, and fan engagement requirements across the top five divisions of English football. Implementation timelines are expected to be announced within 90 days.", "exec_note": "A landmark moment for English football governance. Clubs should begin preparing for the new owners and directors test requirements and fan engagement compliance obligations.", "source": "UK Government / BBC Sport, April 2026", "link": "https://www.bbc.co.uk/sport/football"}, {"category": "governing", "badge": "UEFA update", "title": "UEFA publishes revised Financial Sustainability Regulations ahead of 2026-27 implementation", "summary": "UEFA has published the full technical detail of its revised Financial Sustainability Regulations, which replace the previous Financial Fair Play framework. The new rules introduce a football earnings ratio, a squad cost rule capping wages and transfers at 70% of revenue, and enhanced monitoring of related-party transactions.", "exec_note": "The 70% squad cost cap is the most operationally significant element for clubs in European competition. Current squad costs should be modelled against the new ratio as a priority.", "source": "UEFA Official, April 2026", "link": "https://www.uefa.com"}, {"category": "infra", "badge": "Development", "title": "Premier League clubs collectively invest record £2.1bn in stadium and training ground infrastructure", "summary": "New data from Deloitte shows Premier League clubs have collectively committed £2.1 billion to stadium and training ground development projects in the current cycle — a record figure. Projects range from full stadium rebuilds to technology-led training facility upgrades, with the north of England seeing disproportionately high investment levels.", "exec_note": "Useful benchmarking context for NUFC's own infrastructure planning conversations and any board discussions around the St James' Park development project.", "source": "Deloitte Sports Business Group, April 2026", "link": "https://www.deloitte.com/uk/en/pages/sports-business-group"}, {"category": "europe", "badge": "La Liga", "title": "Real Madrid and Barcelona reach agreement with La Liga over financial fair play compliance timelines", "summary": "Real Madrid and Barcelona have reached a formal agreement with La Liga over extended compliance timelines under the Spanish league's financial control framework, avoiding potential registration restrictions for the summer window. Both clubs had been under enhanced monitoring following pandemic-era losses.", "exec_note": "Relevant context for understanding how European clubs are navigating financial regulations — a benchmark for how the PL's own PSR negotiations may evolve with clubs in similar positions.", "source": "Reuters / Sky Sports, April 2026", "link": "https://www.skysports.com"}, {"category": "world", "badge": "FIFA update", "title": "FIFA confirms expanded Club World Cup format and prize fund structure for 2025 tournament", "summary": "FIFA has confirmed the full prize fund structure for the expanded 32-team Club World Cup, with the total pool set at $1 billion USD. Participating clubs will receive a minimum of $50 million with the winner taking $125 million. Broadcasting rights have been sold across 190 territories.", "exec_note": "The prize fund scale makes Club World Cup participation a meaningful commercial and sporting objective. Relevant to long-term squad investment planning and UEFA coefficient strategy.", "source": "FIFA Official / The Athletic, April 2026", "link": "https://www.fifa.com"}]}];

let activeTab='today',activeCat='all',searchToday='',catArch='all',searchArch='',dayFilter='all',openDay=null;
const openCards=new Set();
function co(id){return COLORS[id]||{border:'#888',bg:'#f5f5f5',text:'#555',light:'#fafafa'}}
function cl(id){return CATEGORIES.find(c=>c.id===id)?.label||id}
function switchTab(t){activeTab=t;document.getElementById('panel-today').style.display=t==='today'?'flex':'none';document.getElementById('panel-archive').style.display=t==='archive'?'flex':'none';document.getElementById('tab-today').className='tab-btn'+(t==='today'?' active':'');document.getElementById('tab-archive').className='tab-btn'+(t==='archive'?' active':'');if(t==='archive')renderArchive()}
function buildStats(){const row=document.getElementById('stat-row');row.innerHTML='';const isAll=activeCat==='all';const a=document.createElement('div');a.className='stat-card';a.style.cssText=`border-color:${isAll?'#0D0D0D':'transparent'};background:${isAll?'#EBEBEB':'#F7F7F7'}`;a.innerHTML=`<div class="stat-label" style="color:#888">ALL</div><div class="stat-num" style="color:#0D0D0D">${TODAY.items.length}</div><div class="stat-name">items today</div>`;a.onclick=()=>{activeCat='all';renderToday()};row.appendChild(a);CATEGORIES.forEach(cat=>{const col=co(cat.id),n=TODAY.items.filter(x=>x.category===cat.id).length,act=activeCat===cat.id;const d=document.createElement('div');d.className='stat-card';d.style.cssText=`border-color:${act?col.border:'transparent'};background:${act?col.bg:'#F7F7F7'}`;d.innerHTML=`<div class="stat-label" style="color:${col.text}">${cat.short.toUpperCase()}</div><div class="stat-num" style="color:${col.border}">${n}</div><div class="stat-name">${n===1?'item':'items'}</div>`;d.onclick=()=>{activeCat=cat.id;renderToday()};row.appendChild(d)})}
function buildLegend(){const el=document.getElementById('legend');el.innerHTML='<span class="legend-key">KEY</span>';CATEGORIES.forEach(c=>{el.innerHTML+=`<div class="legend-item"><div class="legend-dot" style="background:${co(c.id).border}"></div>${c.label}</div>`})}
function buildFilters(cid,cur,onSel){const wrap=document.getElementById(cid);if(!wrap)return;wrap.innerHTML='';const isAll=cur==='all';const ab=document.createElement('button');ab.className='ftab'+(isAll?' active':'');ab.style.cssText=isAll?'background:#0D0D0D;color:#fff;border-color:#0D0D0D':'';ab.innerHTML=`<span class="ftab-dot" style="background:${isAll?'#41B6E6':'#CCC'}"></span>All categories`;ab.onclick=()=>onSel('all');wrap.appendChild(ab);CATEGORIES.forEach(cat=>{const col=co(cat.id),act=cur===cat.id;const b=document.createElement('button');b.className='ftab';b.style.cssText=act?`background:${col.bg};color:${col.text};border-color:${col.border}`:'';b.innerHTML=`<span class="ftab-dot" style="background:${act?col.border:col.border+'77'}"></span>${cat.label}`;b.onclick=()=>onSel(cat.id);wrap.appendChild(b)})}
function filteredToday(){return TODAY.items.filter(item=>{const catOk=activeCat==='all'||item.category===activeCat;const q=searchToday.toLowerCase();return catOk&&(!q||[item.title,item.summary,item.exec_note,item.source].some(t=>t.toLowerCase().includes(q)))})}
function cardHTML(item,id,showDay){const col=co(item.category);const isOpen=openCards.has(id);const dt=showDay&&item.day?`<span class="day-tag">${item.day}</span>`:'';return `<div class="r-card" style="border-left-color:${col.border}"><div class="r-card-header" onclick="toggleCard('${id}')"><div class="r-card-main"><div class="r-card-title">${item.title}</div><div class="r-card-foot"><span class="badge" style="background:${col.bg};color:${col.text}">${item.badge}</span><span class="cat-pill" style="background:${col.bg};color:${col.text}">${cl(item.category)}</span>${dt}<span class="source-text">${item.source}</span></div></div><div class="expand-icon ${isOpen?'open':''}" id="icon-${id}">&#8964;</div></div><div class="r-card-body ${isOpen?'open':''}" id="body-${id}"><p class="r-summary">${item.summary}</p><div class="exec-note" style="background:${col.light};border-left-color:${col.border}"><div class="exec-label" style="color:${col.text}">EXECUTIVE NOTE</div><div class="exec-text">${item.exec_note}</div></div><a class="source-link" style="color:${col.border}" href="${item.link}" target="_blank" rel="noopener noreferrer"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 2H2a1 1 0 00-1 1v7a1 1 0 001 1h7a1 1 0 001-1V8M8 1h3m0 0v3m0-3L5 7"/></svg>${item.link}</a></div></div>`}
function toggleCard(id){const b=document.getElementById('body-'+id),ic=document.getElementById('icon-'+id);if(!b||!ic)return;if(openCards.has(id)){openCards.delete(id);b.classList.remove('open');ic.classList.remove('open')}else{openCards.add(id);b.classList.add('open');ic.classList.add('open')}}
function renderToday(){buildStats();buildLegend();buildFilters('ftabs-today',activeCat,s=>{activeCat=s;renderToday()});const items=filteredToday();const acol=activeCat==='all'?'#41B6E6':co(activeCat).border;document.getElementById('meta-today').innerHTML=`Showing <span style="color:${acol}">${items.length}</span> of ${TODAY.items.length} items`;const list=document.getElementById('cards-today');list.innerHTML=items.length?items.map((item,i)=>cardHTML(item,'td'+i,false)).join(''):`<div class="empty-state"><div class="empty-icon">&#x1F50D;</div><div class="empty-title">No items match</div><div class="empty-body">Try a different keyword or clear the filter.</div></div>`;document.getElementById('cnt-today').textContent=TODAY.items.length;document.getElementById('hdr-date').innerHTML=`<span class="live-dot"></span>${TODAY.day.toUpperCase()}`;document.getElementById('footer-right').textContent=`${TODAY.items.length} ITEMS · ${TODAY.date.toUpperCase()}`}
function allArchiveItems(){return ARCHIVE.flatMap(d=>d.items.map(item=>({...item,day:d.day,dayDate:d.date})))}
function filteredArchive(){return allArchiveItems().filter(item=>{const catOk=catArch==='all'||item.category===catArch;const dayOk=dayFilter==='all'||item.day===dayFilter;const q=searchArch.toLowerCase();return catOk&&dayOk&&(!q||[item.title,item.summary,item.exec_note,item.source].some(t=>t.toLowerCase().includes(q)))})}
function toggleDay(day){openDay=openDay===day?null:day;renderArchiveSummary();if(openDay)setTimeout(()=>{const el=document.getElementById('day-expanded');if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'})},60)}
function renderArchiveSummary(){const wrap=document.getElementById('arch-summary');if(!ARCHIVE.length){wrap.innerHTML=`<div class="empty-state"><div class="empty-icon">&#128193;</div><div class="empty-title">No archived briefings yet</div><div class="empty-body">Yesterday's briefing will appear here each morning when today's is published.</div></div>`;return}const grid=ARCHIVE.map(d=>{const dots=CATEGORIES.map(cat=>{const n=d.items.filter(x=>x.category===cat.id).length;return n>0?`<div class="arch-dot" title="${cat.label}: ${n}" style="background:${COLORS[cat.id].border}"></div>`:''}).join('');const isOpen=openDay===d.day;return `<div class="arch-card ${isOpen?'open':''}" onclick="toggleDay('${d.day}')"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div class="arch-day">${d.day}</div><div class="arch-date">${d.date}</div></div><span class="arch-chevron">&#8250;</span></div><div class="arch-dots" style="margin-top:8px">${dots}</div><div class="arch-count">${d.items.length} ${d.items.length===1?'item':'items'}</div></div>`}).join('');const expandedHTML=openDay?`<div id="day-expanded" style="margin-top:12px"><div style="display:flex;align-items:center;gap:10px;padding:0 0 10px"><span style="font-size:12px;font-weight:700;color:#0D0D0D;letter-spacing:0.05em">${openDay.toUpperCase()}</span><span style="font-size:11px;color:#AAA">${ARCHIVE.find(d=>d.day===openDay)?.date||''}</span><div style="flex:1;height:1px;background:#E5E5E5"></div><span style="font-size:11px;color:#AAA">${ARCHIVE.find(d=>d.day===openDay)?.items.length||0} items</span></div><div class="cards-list">${(ARCHIVE.find(d=>d.day===openDay)?.items||[]).map((item,i)=>cardHTML({...item,day:openDay},'ex'+openDay.replace(/\s/g,'')+i,false)).join('')}</div></div>`:'';wrap.innerHTML=`<div class="archive-grid">${grid}</div>${expandedHTML}`}
function renderArchive(){document.getElementById('cnt-archive').textContent=allArchiveItems().length;buildFilters('ftabs-archive',catArch,s=>{catArch=s;openDay=null;renderArchiveSummary();renderArchiveList()});const sel=document.getElementById('day-sel');sel.innerHTML='<option value="all">All dates</option>';ARCHIVE.forEach(d=>{sel.innerHTML+=`<option value="${d.day}">${d.day} — ${d.date}</option>`});sel.value=dayFilter;renderArchiveSummary();renderArchiveList()}
function renderArchiveList(){const isDefault=dayFilter==='all'&&!searchArch&&catArch==='all';const list=document.getElementById('cards-archive');if(isDefault){document.getElementById('meta-archive').innerHTML=`<span style="color:#AAA">Click a day above to view its briefing</span>`;list.innerHTML='';return}const items=filteredArchive();const acol=catArch==='all'?'#41B6E6':co(catArch).border;document.getElementById('meta-archive').innerHTML=`Showing <span style="color:${acol}">${items.length}</span> archived items`;if(!items.length){list.innerHTML=`<div class="empty-state"><div class="empty-icon">&#x1F50D;</div><div class="empty-title">No items match</div></div>`;return}list.innerHTML=items.map((item,i)=>cardHTML(item,'arf'+i,true)).join('')}
document.getElementById('search-today').addEventListener('input',function(){searchToday=this.value;renderToday()});
document.getElementById('search-archive').addEventListener('input',function(){searchArch=this.value;renderArchiveList()});
document.getElementById('day-sel').addEventListener('change',function(){dayFilter=this.value;renderArchiveList()});
renderToday();
document.getElementById('cnt-archive').textContent=allArchiveItems().length;
</script>
